<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏟️ 실시간 정모 매칭 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fire-glow {
            0%, 100% { border-color: #ef4444; box-shadow: inset 0 0 8px rgba(239,68,68,0.3), 0 0 12px rgba(239,68,68,0.5); }
            50% { border-color: #f97316; box-shadow: inset 0 0 14px rgba(249,115,22,0.5), 0 0 20px rgba(249,115,22,0.7); }
        }
        .hot-player-card { animation: fire-glow 1.5s infinite ease-in-out; background-color: #fffaf7 !important; border-width: 2px !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen pb-20 md:pb-6">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between gap-3">
            <div class="text-center sm:text-left">
                <div class="flex items-center justify-center sm:justify-start gap-2">
                    <a href="./index.html" class="text-xs font-bold text-indigo-600 hover:underline">🏠 대문으로</a>
                    <span class="text-slate-300">|</span>
                    <span id="sessionStatusBadge" class="text-[10px] font-black px-2 py-0.5 rounded-full">대기중</span>
                </div>
                <h1 id="sessionMainTitle" class="text-base sm:text-lg font-black text-slate-900 mt-0.5">정모 라이브 채널</h1>
                <p id="sessionMetaText" class="text-[11px] text-slate-400 font-mono mt-0.5">📅 로딩 중...</p>
            </div>
            
            <div id="adminPanel" class="hidden gap-2">
                <button id="btnToggleStatus" class="bg-slate-900 hover:bg-slate-800 text-white font-black text-xs px-3 py-2 rounded-xl transition cursor-pointer shadow-xs"></button>
            </div>
        </div>
    </header>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-xl z-50 flex md:hidden items-center justify-around py-2.5">
        <button onclick="switchMobileTab('tab-courts')" id="nav-tab-courts" class="flex flex-col items-center gap-1 text-indigo-600 font-black text-xs transition">
            <span class="text-lg">🏟️</span> <span>라이브 대진</span>
        </button>
        <button onclick="switchMobileTab('tab-attendance')" id="nav-tab-attendance" class="flex flex-col items-center gap-1 text-slate-400 font-bold text-xs transition">
            <span class="text-lg">👥</span> <span>출석/제외</span>
        </button>
        <button onclick="switchMobileTab('tab-stats')" id="nav-tab-stats" class="flex flex-col items-center gap-1 text-slate-400 font-bold text-xs transition">
            <span class="text-lg">📊</span> <span>기록/조회</span>
        </button>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-5 grid grid-cols-1 md:grid-cols-12 gap-6">
        
        <section id="sec-attendance" class="md:col-span-3 space-y-4 tab-section">
            <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-3xs">
                <div class="flex justify-between items-center border-b border-slate-100 pb-2 mb-3">
                    <h2 class="text-xs font-black text-slate-700 flex items-center gap-1.5">👥 명단 및 쉼터 관리</h2>
                    <span id="attendeeCountLabel" class="text-[10px] font-mono font-bold bg-slate-100 px-2 py-0.5 rounded-md text-slate-600">0명 참여</span>
                </div>
                
                <div id="attendanceTogglerBox" class="flex flex-wrap gap-1.5 max-h-[140px] overflow-y-auto p-1 border-b border-slate-100 pb-3 mb-3 scrollbar-thin"></div>
                
                <div>
                    <h3 class="text-[10px] font-black text-rose-500 uppercase tracking-wider mb-2">🚨 대기열 제외 인원 (부상, 화장실 등)</h3>
                    <div id="restPlayersContainer" class="flex flex-wrap gap-1.5 text-xs"></div>
                </div>
            </div>
        </section>

        <section id="sec-courts" class="md:col-span-5 space-y-4 tab-section">
            <div id="unsubmittedAlertBox" class="hidden flex-col gap-2 bg-rose-50 border-2 border-rose-200 rounded-2xl p-3 shadow-3xs animate-pulse">
                <h3 class="text-xs font-black text-rose-900 flex items-center gap-1">⚠️ 대진 종료 승리 점수 미입력 홀딩 건</h3>
                <div id="unsubmittedMatchesList" class="space-y-1.5"></div>
            </div>

            <div class="space-y-3">
                <div class="flex justify-between items-center px-1">
                    <h2 class="text-xs font-black text-slate-400 uppercase tracking-wider">🏸 실시간 우선순위 대진 추천 현황</h2>
                    <span class="bg-indigo-50 text-indigo-700 font-mono text-[10px] px-2 py-0.5 rounded-full font-bold">실시간 갱신 중</span>
                </div>
                <div id="liveCourtsContainer" class="space-y-4"></div>
            </div>
        </section>

        <section id="sec-stats" class="md:col-span-4 space-y-4 tab-section">
            <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-3xs">
                <h2 class="text-xs font-black text-slate-700 border-b border-slate-100 pb-2 mb-3">🔥 오늘의 실시간 성적표</h2>
                <div class="overflow-x-auto max-h-[260px] overflow-y-auto rounded-xl border border-slate-100 scrollbar-thin">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 text-[10px] font-black tracking-wide text-center">
                                <th class="py-2 px-1">이름</th>
                                <th class="py-2 px-1">전적</th>
                                <th class="py-2 px-1">승률</th>
                                <th class="py-2 px-1">MMR</th>
                            </tr>
                        </thead>
                        <tbody id="sessionRankTableBody" class="text-xs text-center divide-y divide-slate-100 font-mono font-medium"></tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-3xs">
                <h2 class="text-xs font-black text-slate-700 mb-2">🔍 당일 개인 마감 전적 일지</h2>
                <div class="flex gap-1.5 mb-3">
                    <input type="text" id="inputLocalSearchPlayer" placeholder="이름을 입력하면 즉시 필터링" class="flex-1 bg-slate-50 border border-slate-300 rounded-xl px-3 py-1.5 text-xs outline-none font-bold focus:bg-white focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>
                <div id="localSearchResultContainer" class="space-y-2 max-h-[220px] overflow-y-auto scrollbar-thin"></div>
            </div>
        </section>
    </main>

    <div id="scoreModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-3xl p-5 w-full max-w-sm shadow-2xl border border-slate-100 transform transition-all space-y-4">
            <div class="border-b border-slate-100 pb-1 flex justify-between items-center">
                <h3 class="text-sm font-black text-slate-900">🏆 매치 경기 결과 스코어 판정 기록</h3>
                <button id="btnCloseScoreModal" class="text-slate-400 font-bold text-sm">✕</button>
            </div>
            <div class="space-y-3 text-xs">
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-200 space-y-1">
                    <div class="flex justify-between font-bold"><span class="text-indigo-600">A팀 (상단)</span> <span id="modalTeamANames" class="text-slate-800 font-extrabold"></span></div>
                    <div class="flex justify-between font-bold"><span class="text-emerald-600">B팀 (하단)</span> <span id="modalTeamBNames" class="text-slate-800 font-extrabold"></span></div>
                </div>
                <div class="grid grid-cols-2 gap-4 text-center">
                    <div>
                        <label class="block text-[11px] font-black text-indigo-700 mb-1">A팀 최종 스코어</label>
                        <input type="number" id="inputScoreA" min="0" placeholder="0" class="w-full text-center bg-slate-50 border border-slate-300 rounded-xl p-2 font-mono font-black text-sm outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-[11px] font-black text-emerald-700 mb-1">B팀 최종 스코어</label>
                        <input type="number" id="inputScoreB" min="0" placeholder="0" class="w-full text-center bg-slate-50 border border-slate-300 rounded-xl p-2 font-mono font-black text-sm outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
            </div>
            <button id="btnSubmitMatchScore" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-black text-xs py-2.5 rounded-xl transition shadow-sm cursor-pointer">💾 최종 경기 결과 확정 및 DB 보관</button>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
    <script>
        // 모바일 하단 탭 스위칭 인터페이스 컨트롤러
        function switchMobileTab(targetTabId) {
            document.querySelectorAll('.tab-section').forEach(sec => {
                if(window.innerWidth < 768) { sec.style.display = 'none'; }
                else { sec.style.display = 'block'; }
            });
            const target = document.getElementById(targetTabId);
            if(target && window.innerWidth < 768) target.style.display = 'block';

            // 탭 아이콘 강조 리액션
            const tabs = ['tab-courts', 'tab-attendance', 'tab-stats'];
            tabs.forEach(t => {
                const navBtn = document.getElementById('nav-' + t);
                if(!navBtn) return;
                if(t === targetTabId) {
                    navBtn.classList.remove('text-slate-400', 'font-bold');
                    navBtn.classList.add('text-indigo-600', 'font-black');
                } else {
                    navBtn.classList.remove('text-indigo-600', 'font-black');
                    navBtn.classList.add('text-slate-400', 'font-bold');
                }
            });
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                if (typeof window.initSessionPage === 'function') { window.initSessionPage(); }
                if(window.innerWidth < 768) { switchMobileTab('tab-courts'); }
            }, 300);
        });

        window.addEventListener('resize', () => {
            document.querySelectorAll('.tab-section').forEach(sec => {
                if(window.innerWidth >= 768) sec.style.display = 'block';
                else switchMobileTab('tab-courts');
            });
        });
    </script>
</body>
</html>
