<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏟️ 실시간 정모 매칭 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fire-glow {
            0%, 100% { border-color: #ef4444; box-shadow: inset 0 0 8px rgba(239,68,68,0.3), 0 0 12px rgba(239,68,68,0.5); }
            50% { border-color: #f97316; box-shadow: inset 0 0 14px rgba(249,115,22,0.5), 0 0 20px rgba(249,115,22,0.7); }
        }
        .hot-player-card { animation: fire-glow 1.5s infinite ease-in-out; background-color: #fffaf7 !important; border-width: 2px !important; }

        @keyframes neon-pulse {
            0%, 100% { 
                border-color: #fbbf24; 
                box-shadow: 0 0 12px rgba(251, 191, 36, 0.4), inset 0 0 6px rgba(251, 191, 36, 0.2); 
            }
            50% { 
                border-color: #f59e0b; 
                box-shadow: 0 0 26px rgba(245, 158, 11, 0.9), inset 0 0 12px rgba(245, 158, 11, 0.5);
                background-color: rgba(251, 191, 36, 0.08);
            }
        }
        .my-neon-match-card { 
            animation: neon-pulse 2.2s infinite ease-in-out; 
            border-width: 2.5px !important;
        }

        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .animate-pulse-red { animation: pulse-red 1s infinite ease-in-out; }

        @keyframes row-glow {
            0%, 100% { background-color: rgba(251, 191, 36, 0.1); box-shadow: inset 0 0 4px rgba(251, 191, 36, 0.2); }
            50% { background-color: rgba(251, 191, 36, 0.4); box-shadow: inset 0 0 12px rgba(251, 191, 36, 0.5); font-weight: 900; }
        }
        .highlight-row { animation: row-glow 1.5s infinite ease-in-out; border-left: 4px solid #f59e0b !important; }

        /* 📺 [TV 전광판 스킨 v3 완결판] */
        .tv-fullscreen-mode {
            position: fixed !important; inset: 0 !important; z-index: 9999 !important;
            background-color: #0b0f19 !important; padding: 2.5rem !important;
            display: flex !important; flex-direction: column !important; justify-content: flex-start !important;
            overflow: hidden !important;
        }
        
        .tv-fullscreen-mode #unsubmittedAlertBox,
        .tv-fullscreen-mode #beforeStartStatsBox,
        .tv-fullscreen-mode h2 {
            display: none !important;
        }

        .tv-fullscreen-mode #liveCourtsContainer {
            display: flex !important; flex-direction: column !important;
            gap: 1.75rem !important; width: 100% !important; height: 100% !important;
            justify-content: center !important;
        }

        /* 🏟️ 대진 카드 와이드 바 디자인 (코트 수에 맞춰 1/N 꽉 차게 확장) */
        .tv-fullscreen-mode .tv-card-unit {
            display: flex !important; flex-direction: column !important; justify-content: center !important;
            flex: 1 !important; width: 100% !important; padding: 2rem 3rem !important; 
            background: #161e2e !important; border: 2px solid #243147 !important; border-radius: 2rem !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7) !important; color: #f8fafc !important;
            box-sizing: border-box !important; transition: all 0.3s ease !important;
        }
        
        /* 대기 대진용 노란색 네온 테두리 깜빡임 강제 바인딩 */
        .tv-fullscreen-mode .tv-waiting-neon-border {
            animation: neon-pulse 1.8s infinite ease-in-out !important;
            border-width: 3.5px !important;
        }

        .tv-fullscreen-mode .tv-card-header {
            display: flex !important; justify-content: space-between !important; align-items: center !important;
            border-bottom: 3px solid #1f293d !important; padding-bottom: 0.75rem !important; margin-bottom: 1.25rem !important;
            width: 100% !important;
        }

        /* 👥 선수 이름 명찰 스펙 자이언트 최적화 */
        .tv-fullscreen-mode .tv-player-row {
            display: flex !important; width: 100% !important; align-items: center !important; justify-content: space-between !important; gap: 2rem !important;
        }
        .tv-fullscreen-mode .tv-team-box {
            flex: 1 !important; font-size: 3rem !important; font-weight: 950 !important; color: #ffffff !important; 
            background-color: #030712 !important; border: 3px solid #374151 !important; 
            padding: 2rem !important; border-radius: 2rem !important; text-align: center !important;
            box-shadow: inset 0 4px 6px -1px rgba(0, 0, 0, 0.6) !important;
            white-space: nowrap !important; overflow: hidden !important; text-overflow: ellipsis !important;
        }
        .tv-fullscreen-mode .tv-vs-badge {
            font-size: 2.6rem !important; color: #64748b !important; font-weight: 900 !important; flex-shrink: 0 !important;
        }

        /* ⏱️ 경기 시간 타이머 최적화 */
        .tv-fullscreen-mode .match-live-stopwatch { 
            font-size: 2.2rem !important; font-weight: 950 !important; color: #ffffff !important; 
            background-color: #ef4444 !important; padding: 0.4rem 1.5rem !important; border-radius: 1rem !important;
            box-shadow: 0 4px 14px rgba(239, 68, 68, 0.4) !important;
        }
        .tv-fullscreen-mode .tv-status-txt { font-size: 1.6rem !important; font-weight: 950 !important; color: #f8fafc !important; }
        
        /* 🚨 입장해 주세요 사이렌 텍스트 */
        .tv-entry-siren {
            font-size: 1.8rem !important; font-weight: 950 !important; color: #fbbf24 !important;
            background-color: rgba(251, 191, 36, 0.15) !important; border: 2px solid #fbbf24 !important;
            padding: 0.4rem 1.5rem !important; border-radius: 1rem !important;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.3) !important;
        }
        
        /* 전광판 모드 내 제어용 버튼 차단 */
        .tv-fullscreen-mode button, .tv-fullscreen-mode .btn-ai-simulate { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen pb-20 md:pb-6">

    <header id="mainPageHeader" class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-2xs">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between gap-3">
            <div class="text-center sm:text-left">
                <div class="flex items-center justify-center sm:justify-start gap-2">
                    <a href="./index.html" class="text-xs font-bold text-indigo-600 hover:underline">🏠 대문으로</a>
                    <span class="text-slate-300">|</span>
                    <span id="sessionStatusBadge" class="text-[10px] font-black px-2 py-0.5 rounded-full bg-slate-100">로딩...</span>
                </div>
                <h1 id="sessionMainTitle" class="text-base sm:text-lg font-black text-slate-900 mt-0.5 cursor-pointer select-none active:scale-[0.99]">정모 라이브 채널</h1>
                <p id="sessionMetaText" class="text-[11px] text-slate-400 font-mono mt-0.5">📅 로딩 중...</p>
            </div>
            
            <div class="flex items-center gap-2 flex-wrap justify-center">
                <div class="bg-slate-100 px-3 py-1 rounded-xl border flex items-center gap-1 text-xs font-bold">
                    <span class="text-slate-500">👤 내 이름 설정:</span>
                    <select id="selectMyIdentity" class="bg-white border text-slate-800 rounded-lg px-1.5 py-0.5 font-black outline-none">
                        <option value="">-- 일반 관람 모드 --</option>
                    </select>
                </div>
                <div id="adminButtonWrapper" class="h-0 overflow-hidden transition-all duration-300 flex items-center justify-center w-full sm:w-auto">
                    <button id="btnAdminToggle" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs font-bold px-3 py-1.5 rounded-xl border transition shadow-sm cursor-pointer"></button>
                </div>
                <div id="adminPanel" class="hidden gap-2">
                    <button id="btnToggleStatus" class="bg-indigo-600 hover:bg-indigo-700 text-white font-black text-xs px-3 py-1.5 rounded-xl shadow-md cursor-pointer"></button>
                </div>
            </div>
        </div>
    </header>

    <nav id="mobileBottomNav" class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-xl z-50 flex md:hidden items-center justify-around py-2.5">
        <button onclick="switchMobileTab('sec-courts')" id="nav-tab-courts" class="flex flex-col items-center gap-1 text-indigo-600 font-black text-xs transition relative">
            <span class="text-lg">🏟️</span> <span>라이브 대진</span>
            <span id="myMatchNotificationBadge" class="absolute top-0 right-3 w-2.5 h-2.5 bg-rose-500 rounded-full ring-2 ring-white hidden animate-ping"></span>
            <span id="myMatchNotificationBadgeSolid" class="absolute top-0 right-3 w-2.5 h-2.5 bg-rose-500 rounded-full ring-2 ring-white hidden"></span>
        </button>
        <button onclick="switchMobileTab('sec-attendance')" id="nav-tab-attendance" class="flex flex-col items-center gap-1 text-slate-400 font-bold text-xs transition">
            <span class="text-lg">👥</span> <span>출석 현황</span>
        </button>
        <button onclick="switchMobileTab('sec-stats')" id="nav-tab-stats" class="flex flex-col items-center gap-1 text-slate-400 font-bold text-xs transition">
            <span class="text-lg">📊</span> <span>기록/조회</span>
        </button>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-5 grid grid-cols-1 md:grid-cols-12 gap-6">
        <section id="sec-attendance" class="md:col-span-3 space-y-4 tab-section">
            <div id="adminConfigBox" class="hidden bg-gradient-to-br from-indigo-50 to-slate-50 border border-indigo-200 rounded-2xl p-4 shadow-3xl flex-col gap-3">
                <h3 class="text-xs font-black text-indigo-950">⚙️ 라이브 환경 설정</h3>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <div>
                        <select id="selectLiveCourts" class="w-full bg-white border rounded-lg px-2 py-1 font-black">
                            <option value="1">1개 코트</option>
                            <option value="2" selected>2개 코트</option>
                            <option value="3">3개 코트</option>
                            <option value="4">4개 코트</option>
                            <option value="5">5개 코트</option>
                            <option value="6">6개 코트</option>
                        </select>
                    </div>
                    <div>
                        <input type="number" id="inputLiveTargetScore" class="w-full bg-white border rounded-lg px-2 py-1 font-black font-mono">
                    </div>
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-3xs space-y-4">
                <div id="adminOnlyAttendanceInputWrapper" class="space-y-1.5 text-xs relative hidden">
                    <input type="text" id="inputKeyboardAttendance" placeholder="이름을 입력 후 Enter치면 출석 처리" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-3 py-2 font-bold outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500">
                    <div id="duplicateSelectionBox" class="absolute left-0 right-0 top-14 bg-white border-2 border-indigo-400 rounded-xl p-2 shadow-xl z-50 space-y-1.5 hidden">
                        <div id="duplicateListWrapper" class="flex flex-col gap-1"></div>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <div class="flex justify-between items-center border-b border-slate-100 pb-2 mb-3">
                        <h2 class="text-xs font-black text-slate-700 flex items-center gap-1.5"><span id="attendanceBoxTitle">👥 명단 및 쉼터 관리</span></h2>
                        <span id="attendeeCountLabel" class="text-[10px] font-mono font-bold bg-slate-100 px-2 py-0.5 rounded-md text-slate-600">0명 참여</span>
                    </div>
                    <div id="attendanceTogglerBox" class="flex flex-wrap gap-1.5 max-h-[240px] overflow-y-auto p-1 border rounded-xl bg-slate-50/50 scrollbar-thin"></div>
                </div>
                <div class="hidden"><div id="restPlayersContainer"></div></div>
            </div>
        </section>

        <section id="sec-courts" class="md:col-span-5 space-y-4 tab-section">
            <div id="unsubmittedAlertBox" class="hidden flex-col gap-2 bg-rose-50 border-2 border-rose-200 rounded-2xl p-3 shadow-3xs animate-pulse">
                <h3 class="text-xs font-black text-rose-900 flex items-center gap-1">⚠️ 대진 종료 승리 점수 미입력 홀딩 건</h3>
                <div id="unsubmittedMatchesList" class="space-y-1.5"></div>
            </div>

            <div class="space-y-3 relative">
                <div class="flex justify-between items-center px-1">
                    <h2 class="text-xs font-black text-slate-400 uppercase tracking-wider">🏸 실시간 우선순위 대진 추천 현황</h2>
                    <button id="btnTvDisplayLauncher" class="bg-indigo-50 border border-indigo-200 text-indigo-700 font-sans text-[10px] px-2.5 py-1 rounded-xl font-black shadow-3xs cursor-pointer hover:bg-indigo-100 transition-all">📺 공용 TV 전광판 모드 열기</button>
                </div>
                
                <div id="liveCourtsContainer" class="space-y-4"></div>
            </div>

            <div id="beforeStartStatsBox" class="bg-white border border-slate-200 rounded-2xl p-4 shadow-3xs space-y-3">
                <div class="border-b border-slate-100 pb-2">
                    <h3 class="text-xs font-black text-indigo-950 flex items-center gap-1">📋 실시간 넥스트 경기 대기열 큐 (MMR 순번)</h3>
                    <p class="text-[9px] text-slate-400 mt-0.5">현재 코트 밖에서 대기 중인 인원들이 레이팅 점수가 높은 고수 순서대로 정렬됩니다.</p>
                </div>
                <div class="overflow-y-auto max-h-[300px] divide-y divide-slate-100 text-[11px] font-medium scrollbar-thin" id="beforeStartPlayersList"></div>
            </div>
        </section>

        <section id="sec-stats" class="md:col-span-4 space-y-4 tab-section">
            <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-3xs">
                <h2 class="text-xs font-black text-slate-700 border-b border-slate-100 pb-2 mb-3">🔥 오늘의 실시간 성적표</h2>
                <div class="overflow-x-auto max-h-[260px] overflow-y-auto rounded-xl border border-slate-100 scrollbar-thin">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 text-[10px] font-black tracking-wide text-center">
                                <th class="py-2 px-1">이름</th>
                                <th class="py-2 px-1">전적</th>
                                <th class="py-2 px-1">승률</th>
                                <th class="py-2 px-1">MMR</th>
                            </tr>
                        </thead>
                        <tbody id="sessionLiveRankTableBody" class="text-xs text-center divide-y divide-slate-100 font-mono font-medium"></tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-3xs">
                <h2 class="text-xs font-black text-slate-700 mb-2">🔍 당일 개인 마감 전적 일지</h2>
                <div class="flex gap-1.5 mb-3">
                    <input type="text" id="inputLocalSearchPlayer" placeholder="이름을 입력하면 즉시 필터링" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-3 py-1.5 text-xs outline-none font-bold focus:bg-white focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>
                <div id="localSearchResultContainer" class="space-y-2 max-h-[220px] overflow-y-auto scrollbar-thin"></div>
            </div>
        </section>
    </main>

    <!-- 스코어 모달 -->
    <div id="scoreModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-3xl p-5 w-full max-w-sm shadow-2xl border border-slate-100 transform transition-all space-y-4">
            <div class="border-b border-slate-100 pb-1 flex justify-between items-center">
                <h3 class="text-sm font-black text-slate-900">🏆 매치 경기 결과 스코어 판정 기록</h3>
                <button id="btnCloseScoreModal" class="text-slate-400 font-bold text-sm">✕</button>
            </div>
            <div class="space-y-4 text-xs">
                <div class="bg-slate-50 p-3 rounded-2xl border border-slate-200 space-y-3">
                    <div class="flex justify-between items-center bg-white p-2.5 rounded-xl border border-slate-200">
                        <div class="text-left flex-1 mr-2">
                            <span class="text-[9px] font-black text-indigo-500 block">TEAM A</span>
                            <span id="modalTeamANames" class="text-xs font-black text-slate-800"></span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <button id="btnWinASelector" class="bg-slate-100 hover:bg-indigo-50 text-slate-700 hover:text-indigo-700 font-black px-2.5 py-1.5 rounded-lg border border-slate-300 transition-all">승리</button>
                            <input type="number" id="inputScoreA" min="0" placeholder="점수" class="w-16 text-center bg-slate-50 border border-slate-300 rounded-lg p-1.5 font-mono font-black text-sm outline-none">
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center bg-white p-2.5 rounded-xl border border-slate-200">
                        <div class="text-left flex-1 mr-2">
                            <span class="text-[9px] font-black text-emerald-500 block">TEAM B</span>
                            <span id="modalTeamBNames" class="text-xs font-black text-slate-800"></span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <button id="btnWinBSelector" class="bg-slate-100 hover:bg-emerald-50 text-slate-700 hover:text-emerald-700 font-black px-2.5 py-1.5 rounded-lg border border-slate-300 transition-all">승리</button>
                            <input type="number" id="inputScoreB" min="0" placeholder="점수" class="w-16 text-center bg-slate-50 border rounded-lg p-1.5 font-mono font-black text-sm outline-none">
                        </div>
                    </div>
                </div>
            </div>
            <button id="btnSubmitMatchScore" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-3 rounded-xl transition shadow-md cursor-pointer">💾 최종 경기 결과 확정 및 정산</button>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
    <script>
        window.currentActiveMobileTabId = 'sec-courts';

        function switchMobileTab(targetSectionId) {
            if(window.innerWidth >= 768) return;
            window.currentActiveMobileTabId = targetSectionId;
            document.querySelectorAll('.tab-section').forEach(sec => { sec.style.display = 'none'; });
            
            const activeSection = document.getElementById(targetSectionId);
            if(activeSection) { activeSection.style.display = 'block'; activeSection.classList.remove('hidden'); }

            if(targetSectionId === 'sec-courts') {
                const b1 = document.getElementById('myMatchNotificationBadge');
                const b2 = document.getElementById('myMatchNotificationBadgeSolid');
                if(b1 && b2) { b1.classList.add('hidden'); b2.classList.add('hidden'); }
            }

            const tabButtonMapping = { 'sec-courts': 'nav-tab-courts', 'sec-attendance': 'nav-tab-attendance', 'sec-stats': 'nav-tab-stats' };
            Object.entries(tabButtonMapping).forEach(([secId, btnId]) => {
                const btn = document.getElementById(btnId); if(!btn) return;
                if(secId === targetSectionId) { btn.classList.remove('text-slate-400', 'font-bold'); btn.classList.add('text-indigo-600', 'font-black'); } 
                else { btn.classList.remove('text-indigo-600', 'font-black'); btn.classList.add('text-slate-400', 'font-bold'); }
            });
        }

        const tvLauncher = document.getElementById('btnTvDisplayLauncher');
        if(tvLauncher) {
            tvLauncher.onclick = function(e) {
                e.preventDefault();
                const targetArea = document.getElementById('sec-courts');
                
                if(!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().then(() => {
                        targetArea.classList.add('tv-fullscreen-mode');
                        tvLauncher.innerText = "❌ 전광판 모드 닫기 (Esc)";
                        tvLauncher.className = "fixed bottom-6 right-6 z-[10000] bg-rose-600 text-white text-xs px-4 py-2.5 rounded-2xl font-black shadow-xl cursor-pointer";
                    }).catch(err => { alert("전체화면 전환 실패: 기기 권한 부족"); });
                } else {
                    document.exitFullscreen();
                }
            };
        }

        document.addEventListener('fullscreenchange', () => {
            const targetArea = document.getElementById('sec-courts');
            if(!document.fullscreenElement) {
                targetArea.classList.remove('tv-fullscreen-mode');
                tvLauncher.innerText = "📺 공용 TV 전광판 모드 열기";
                tvLauncher.className = "bg-indigo-50 border border-indigo-200 text-indigo-700 font-sans text-[10px] px-2.5 py-1 rounded-xl font-black shadow-3xs cursor-pointer hover:bg-indigo-100 transition-all";
            }
        });

        window.addEventListener('load', () => {
            setTimeout(() => {
                if (typeof window.initSessionPage === 'function') { window.initSessionPage(); }
                if(window.innerWidth < 768) { switchMobileTab('sec-courts'); }
            }, 300);
        });

        window.addEventListener('resize', () => {
            document.querySelectorAll('.tab-section').forEach(sec => {
                if(window.innerWidth >= 768) { sec.style.display = 'block'; sec.classList.remove('hidden'); }
                else { switchMobileTab(window.currentActiveMobileTabId); }
            });
        });
    </script>
</body>
</html>
