<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏟️ 정모 실시간 통합 제어 센터</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-12 select-none">

    <header class="bg-white border-b border-slate-200 p-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span id="statusBadge" class="bg-slate-100 text-slate-600 text-xs font-bold px-2.5 py-1 rounded border border-slate-200">연결 확인 중...</span>
                <h1 class="text-base font-bold text-slate-900 font-sans" id="sessionTitle">📅 정모 리그전 제어실</h1>
            </div>
            <nav class="flex gap-2">
                <a href="./index.html" class="bg-white hover:bg-slate-50 text-slate-600 text-xs font-bold px-3 py-1.5 rounded border border-slate-200 transition shadow-xs">🏠 홈 대시보드</a>
                <a href="./players.html" class="bg-white hover:bg-slate-50 text-slate-600 text-xs font-bold px-3 py-1.5 rounded border border-slate-200 transition shadow-xs">👥 회원 DB 관리</a>
            </nav>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-4 mt-4 space-y-6">
        
        <div id="viewReady" class="grid grid-cols-1 md:grid-cols-3 gap-6" style="display:none;">
            
            <div class="md:col-span-1 space-y-4">
                <section class="bg-white rounded-2xl border border-slate-200 p-5 space-y-4 shadow-sm sticky top-24">
                    <div class="border-b border-slate-100 pb-2">
                        <h2 class="text-xs font-extrabold text-indigo-600 uppercase tracking-wider">⚙️ 정모 제어 패널</h2>
                        <p class="text-[11px] text-slate-400 mt-0.5">참석 인원과 코트를 실시간 셋팅합니다.</p>
                    </div>
                    
                    <div class="space-y-1.5 text-xs">
                        <label class="text-slate-600 font-bold">사용 가능 코트 수</label>
                        <select id="selectCourts" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-slate-900 font-bold focus:border-indigo-500 focus:outline-none">
                            <option value="1">1 개 코트</option>
                            <option value="2">2 개 코트</option>
                            <option value="3">3 개 코트</option>
                            <option value="4" selected>4 개 코트</option>
                        </select>
                    </div>

                    <div class="space-y-2 pt-2">
                        <button id="btnSaveSetup" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-2.5 rounded-lg text-xs shadow-xs transition cursor-pointer">
                            💾 중간 현황 서버에 저장 (예약)
                        </button>
                        <button id="btnStartSession" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-3 rounded-lg text-xs shadow-md hover:shadow-lg transition cursor-pointer">
                            ▶️ 정모 매칭 리그전 공식 시작!
                        </button>
                    </div>
                </section>
            </div>

            <div class="md:col-span-2">
                <section class="bg-white rounded-2xl border border-slate-200 p-5 space-y-4 shadow-sm">
                    <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                        <div>
                            <h2 class="text-sm font-bold text-slate-800">👥 오늘 정모 참석자 출석부</h2>
                            <p class="text-[11px] text-slate-400 mt-0.5">선택된 인원: <span id="checkedCount" class="text-indigo-600 font-bold">0</span>명</p>
                        </div>
                        <button id="btnSelectAll" class="text-[11px] bg-slate-50 hover:bg-slate-100 text-slate-600 border border-slate-200 px-3 py-1.5 rounded-lg font-medium shadow-xs">전체 선택 / 해제</button>
                    </div>
                    <div id="attendanceGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-2.5 max-h-[600px] overflow-y-auto pr-1"></div>
                </section>
            </div>
        </div>

        <div id="viewLive" class="grid grid-cols-1 gap-6" style="display:none;">
            
            <div class="flex justify-between items-center bg-white border border-slate-200 p-4 rounded-xl shadow-sm">
                <div>
                    <h2 class="text-sm font-black text-slate-900" id="liveSessionNameDisplay">🏆 라이브 리그전 진행 중</h2>
                    <p class="text-[11px] text-slate-400 mt-0.5">실시간 MMR 기반 자동 밸런싱 대진 모드입니다.</p>
                </div>
                <button id="btnEndSession" class="bg-rose-600 hover:bg-rose-700 text-white font-bold text-xs px-4 py-2 rounded-lg shadow cursor-pointer">
                    🛑 오늘 정모 최종 종료 및 마감
                </button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 space-y-4">
                    <h3 class="text-xs font-extrabold text-slate-400 uppercase tracking-wider pl-1">🏟️ 실시간 진행 코트 현황</h3>
                    <div id="courtsContainer" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
                </div>

                <div class="lg:col-span-1 space-y-4">
                    <section class="bg-white border border-slate-200 p-4 rounded-2xl shadow-sm space-y-3">
                        <div class="border-b border-slate-100 pb-2">
                            <h3 class="text-xs font-black text-slate-900">📋 정모 라이브 대기열 명단</h3>
                            <p class="text-[10px] text-slate-400 mt-0.5">파란 뱃지는 코트 밖에서 대기 중인 인원입니다.</p>
                        </div>
                        <div id="liveWaitingContainer" class="grid grid-cols-2 gap-1.5 max-h-[450px] overflow-y-auto pr-1">
                            </div>
                    </section>
                </div>
            </div>
        </div>

        <div id="viewArchive" class="text-center py-20 bg-white rounded-xl border border-slate-200 shadow-sm" style="display:none;">
            <h2 class="text-lg font-bold text-indigo-600">📝 본 정모 세션 최종 마감 완료 (기록실)</h2>
            <p class="text-xs text-slate-500 mt-2" id="archiveSessionNameDisplay">경기가 모두 안전하게 마감되었습니다.</p>
        </div>

    </main>

    <div id="scoreModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center z-50 shadow-2xl" style="display: none;">
        <div class="bg-white rounded-2xl border border-slate-200 max-w-sm w-full p-6 space-y-4 shadow-2xl">
            <div class="border-b border-slate-100 pb-2"><h3 class="text-xs font-black text-indigo-600 uppercase tracking-wider" id="modalCourtTitle">🏟️ 결과 입력</h3></div>
            <div class="space-y-4">
                <div class="bg-slate-50 p-3 rounded-xl border flex justify-between items-center">
                    <div class="text-left"><span class="text-[10px] font-bold text-rose-500 block">TEAM A</span><span id="modalTeamANames" class="text-xs font-bold text-slate-800"></span></div>
                    <input type="number" id="scoreA" min="0" max="31" value="0" class="w-16 bg-white border rounded-lg p-2 text-center text-base font-black font-mono">
                </div>
                <div class="bg-slate-50 p-3 rounded-xl border flex justify-between items-center">
                    <div class="text-left"><span class="text-[10px] font-bold text-sky-500 block">TEAM B</span><span id="modalTeamBNames" class="text-xs font-bold text-slate-800"></span></div>
                    <input type="number" id="scoreB" min="0" max="31" value="0" class="w-16 bg-white border rounded-lg p-2 text-center text-base font-black font-mono">
                </div>
            </div>
            <div class="flex gap-2 pt-2 text-xs">
                <button id="btnCancelModal" class="flex-1 bg-slate-100 text-slate-600 font-bold py-2.5 rounded-lg">취소</button>
                <button id="btnSubmitScore" class="flex-1 bg-indigo-600 text-white font-bold py-2.5 rounded-lg">경기 확정 정산</button>
            </div>
        </div>
    </div>

    <script type="module">
        import "./app.js";
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof window.initSessionPage === 'function') {
                window.initSessionPage();
            }
        });
    </script>
</body>
</html>
