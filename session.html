<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏟️ 실시간 정모 매칭 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fire-glow {
            0%, 100% { border-color: #ef4444; box-shadow: inset 0 0 8px rgba(239,68,68,0.3), 0 0 12px rgba(239,68,68,0.5); }
            50% { border-color: #f97316; box-shadow: inset 0 0 14px rgba(249,115,22,0.5), 0 0 20px rgba(249,115,22,0.7); }
        }
        .hot-player-card { animation: fire-glow 1.5s infinite ease-in-out; background-color: #fffaf7 !important; border-width: 2px !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-xs">
        <div class="max-w-6xl mx-auto px-4 py-3 flex flex-col sm:flex-row items-center justify-between gap-3">
            <div>
                <div class="flex items-center gap-2">
                    <a href="./index.html" class="text-xs font-bold text-indigo-600 hover:underline">🏠 대문으로</a>
                    <span id="sessionStatusBadge" class="text-[10px] font-black px-2 py-0.5 rounded-full bg-slate-100">로딩...</span>
                </div>
                <h1 id="sessionMainTitle" class="text-base font-black text-slate-900 mt-0.5">정모 채널 로딩 중...</h1>
                <p id="sessionMetaText" class="text-[10px] font-mono text-slate-400">데이터베이스 동기화 시동 중...</p>
            </div>
            
            <div class="flex items-center gap-2 flex-wrap">
                <div class="bg-slate-100 px-3 py-1 rounded-xl border flex items-center gap-1 text-xs font-bold">
                    <span>👤 내 이름 설정:</span>
                    <select id="selectMyIdentity" class="bg-white border text-slate-800 rounded-lg px-1.5 py-0.5 font-black outline-none">
                        <option value="">-- 일반 관람 모드 --</option>
                    </select>
                </div>
                <button id="btnAdminToggle" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs font-bold px-3 py-1.5 rounded-xl border transition shadow-sm"></button>
                <div id="adminPanel" class="hidden gap-2">
                    <button id="btnToggleStatus" class="bg-indigo-600 hover:bg-indigo-700 text-white font-black text-xs px-3 py-1.5 rounded-xl shadow-xs"></button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-4 grid grid-cols-1 lg:grid-cols-12 gap-5">
        
        <section class="lg:col-span-4 space-y-4">
            <div id="adminConfigBox" class="hidden bg-gradient-to-br from-indigo-50 to-slate-50 border border-indigo-200 rounded-2xl p-4 shadow-3xl flex-col gap-3">
                <h3 class="text-xs font-black text-indigo-950">⚙️ 라이브 정모 세부 제어반</h3>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-600 mb-0.5">🏟️ 사용 코트 수</label>
                        <select id="selectLiveCourts" class="w-full bg-white border rounded-lg px-2 py-1 font-black">
                            <option value="1">1개 코트</option>
                            <option value="2" selected>2개 코트</option>
                            <option value="3">3개 코트</option>
                            <option value="4">4개 코트</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-600 mb-0.5">🎯 목표 승리 점수</label>
                        <input type="number" id="inputLiveTargetScore" class="w-full bg-white border rounded-lg px-2 py-1 font-black font-mono">
                    </div>
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-3xs space-y-4">
                <div class="border-b pb-2 flex justify-between items-center">
                    <h2 id="attendanceBoxTitle" class="text-xs font-black text-slate-700">👥 정모 명단 관리</h2>
                    <span id="attendeeCountLabel" class="text-[9px] font-mono font-black bg-indigo-50 border px-2 py-0.5 rounded text-indigo-700">0명 참여</span>
                </div>
                
                <div id="adminOnlyAttendanceInputWrapper" class="space-y-1.5 text-xs relative hidden">
                    <input type="text" id="inputKeyboardAttendance" placeholder="이름을 입력 후 Enter치면 출석 처리" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-3 py-2 font-bold outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500">
                    <div id="duplicateSelectionBox" class="absolute left-0 right-0 top-14 bg-white border-2 border-indigo-400 rounded-xl p-2 shadow-xl z-50 space-y-1.5 hidden">
                        <div id="duplicateListWrapper" class="flex flex-col gap-1"></div>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <div id="attendanceTogglerBox" class="flex flex-wrap gap-1.5 p-1 border rounded-xl bg-slate-50/50 max-h-[220px] overflow-y-auto"></div>
                </div>
                
                <div class="border-t pt-3">
                    <h3 class="text-[10px] font-black text-rose-500 uppercase tracking-wider mb-2">🚨 대기열 제외 명단 (부상, 휴식자)</h3>
                    <div id="restPlayersContainer" class="flex flex-wrap gap-1.5 text-xs"></div>
                </div>
            </div>

            <div id="beforeStartStatsBox" class="bg-white border border-slate-200 rounded-2xl p-4 shadow-3xs space-y-3">
                <div class="border-b pb-2">
                    <h3 class="text-xs font-black text-indigo-950">🏆 정모 참가자 MMR 랭킹 리스트 (시작 전)</h3>
                </div>
                <div class="overflow-y-auto max-h-[300px] divide-y text-[11px] font-medium" id="beforeStartPlayersList"></div>
            </div>
        </section>

        <section class="lg:col-span-5 space-y-4">
            <div class="space-y-3">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-wider px-1">🏸 실시간 우선순위 대진 추천 현황</h2>
                <div id="liveCourtsContainer" class="space-y-4"></div>
            </div>
        </section>

        <section class="lg:col-span-3 space-y-4">
            <div id="liveStatsActiveWrapper" class="hidden flex-col gap-4">
                <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-3xs">
                    <h2 class="text-xs font-black text-slate-700 border-b pb-2 mb-3">🔥 오늘의 실시간 성적표</h2>
                    <div class="overflow-x-auto max-h-[260px] overflow-y-auto rounded-xl border border-slate-100">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 border-b text-slate-500 text-[10px] font-black text-center">
                                    <th class="py-2 px-1">이름</th>
                                    <th class="py-2 px-1">전적</th>
                                    <th class="py-2 px-1">승률</th>
                                    <th class="py-2 px-1">MMR</th>
                                </tr>
                            </thead>
                            <tbody id="sessionLiveRankTableBody" class="text-xs text-center divide-y font-mono"></tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-3xs">
                    <h2 class="text-xs font-black text-slate-700 mb-2">🔍 당일 개인 마감 전적 일지</h2>
                    <input type="text" id="inputLocalSearchPlayer" placeholder="이름을 입력하면 즉시 필터링" class="w-full bg-slate-50 border rounded-xl px-3 py-1.5 text-xs outline-none font-bold focus:bg-white focus:ring-2 focus:ring-indigo-500 transition-all">
                    <div id="localSearchResultContainer" class="space-y-2 max-h-[220px] overflow-y-auto mt-2"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="scoreModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-3xl p-5 w-full max-w-sm shadow-2xl border space-y-4">
            <div class="border-b pb-1 flex justify-between items-center">
                <h3 class="text-sm font-black text-slate-900">🏆 매치 결과 점수 기록</h3>
                <button id="btnCloseScoreModal" class="text-slate-400 font-bold text-sm">✕</button>
            </div>
            <div class="space-y-4 text-xs">
                <div class="bg-slate-50 p-3 rounded-2xl border space-y-3">
                    <p class="text-[10px] font-black text-slate-400 uppercase text-center border-b pb-1">🥇 승리 팀을 체크하세요</p>
                    <label class="flex justify-between items-center bg-white p-2.5 rounded-xl border cursor-pointer">
                        <div class="flex items-center gap-2">
                            <input type="radio" name="winnerSelect" value="A" id="radioWinA" class="w-4 h-4 text-indigo-600">
                            <div class="text-left"><span class="text-[9px] font-black text-indigo-500 block">TEAM A</span><span id="modalTeamANames" class="text-xs font-black text-slate-800"></span></div>
                        </div>
                        <input type="number" id="inputScoreA" min="0" placeholder="점수" class="w-16 text-center bg-slate-50 border rounded-lg p-1 font-mono font-black text-sm outline-none">
                    </label>
                    <label class="flex justify-between items-center bg-white p-2.5 rounded-xl border cursor-pointer">
                        <div class="flex items-center gap-2">
                            <input type="radio" name="winnerSelect" value="B" id="radioWinB" class="w-4 h-4 text-emerald-600">
                            <div class="text-left"><span class="text-[9px] font-black text-emerald-500 block">TEAM B</span><span id="modalTeamBNames" class="text-xs font-black text-slate-800"></span></div>
                        </div>
                        <input type="number" id="inputScoreB" min="0" placeholder="점수" class="w-16 text-center bg-slate-50 border rounded-lg p-1 font-mono font-black text-sm outline-none">
                    </label>
                </div>
            </div>
            <button id="btnSubmitMatchScore" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-3 rounded-xl shadow-md">💾 경기 결과 확정 정산</button>
        </div>
    </div>

</body>
</html>
