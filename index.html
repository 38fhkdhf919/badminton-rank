<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔗 파이어베이스 연동 테스트 프로토타입</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-2xl text-center space-y-4">
        <h1 class="text-lg font-bold">📡 실시간 서버 연동 검증 스테이지</h1>
        <p class="text-xs text-slate-400">깃허브 웹 화면과 파이어베이스 Realtime DB가 실시간으로 통신하는지 검사합니다.</p>
        
        <div class="p-4 bg-slate-950 rounded-lg border border-slate-900 font-mono">
            <span class="text-xs text-slate-500 block mb-1">파이어베이스 수신 데이터:</span>
            <span id="connectionBadge" class="text-amber-500 font-black text-xl animate-pulse">서버 신호 대기 중...</span>
        </div>
        
        <p class="text-[10px] text-slate-500">※ 파이어베이스 콘솔에서 데이터를 바꾸면 이 화면이 실시간으로 변합니다.</p>
    </div>

    <script type="module">
        import "./app.js";

        // 페이지 로드 시 파이어베이스 실시간 수신 대기 시작
        window.addEventListener('DOMContentLoaded', () => {
            const badge = document.getElementById('connectionBadge');
            
            if (typeof window.checkServerConnection === 'function') {
                window.checkServerConnection((serverData) => {
                    if (serverData === "SUCCESS") {
                        badge.innerText = "✅ 통신 성공 (SUCCESS)";
                        badge.className = "text-emerald-400 font-black text-xl";
                    } else if (serverData === "CONNECTION_ERROR") {
                        badge.innerText = "❌ 인증 실패 (Config 오류)";
                        badge.className = "text-red-400 font-black text-xl";
                    } else {
                        badge.innerText = `❓ 알 수 없는 데이터 (${serverData})`;
                        badge.className = "text-amber-400 font-black text-xl";
                    }
                });
            } else {
                badge.innerText = "❌ app.js 로드 실패";
                badge.className = "text-red-500 font-black text-xl";
            }
        });
    </script>
</body>
</html>
