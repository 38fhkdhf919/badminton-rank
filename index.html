<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 클럽 매칭 및 명예의 전당</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @keyframes border-glow {
            0%, 100% { border-color: #ef4444; box-shadow: 0 0 12px rgba(239, 68, 68, 0.6); }
            50% { border-color: #f97316; box-shadow: 0 0 20px rgba(249, 115, 22, 0.8); }
        }
        .fire-rank-card { animation: border-glow 2s infinite ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen">

    <header class="bg-gradient-to-r from-slate-900 to-indigo-950 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-6 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="text-center sm:text-left">
                <h1 class="text-xl sm:text-2xl font-black tracking-tight font-sans">🏸 CLUB LIVE SCOREBOARD</h1>
                <p class="text-xs text-indigo-200 mt-1 font-medium">우리 클럽의 모든 실시간 정모 매칭과 누적 명예의 전당 아카이브</p>
            </div>
            <div>
                <button id="btnAdminToggle" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs font-bold px-3 py-2 rounded-xl border border-slate-700 transition shadow-sm cursor-pointer flex items-center gap-1.5"></button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        <section class="lg:col-span-5 space-y-6">
            <div id="testModeWrapper" class="bg-gradient-to-br from-indigo-50 to-slate-50 border-2 border-indigo-200 p-5 rounded-2xl shadow-sm hidden flex-col gap-4">
                <div class="flex items-center gap-2 border-b border-indigo-100 pb-2">
                    <span class="text-lg">👑</span>
                    <h2 class="text-sm font-black text-indigo-950">새로운 정모 세션 개설 (관리자 전용)</h2>
                </div>
                <form id="createSessionForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-black text-slate-700 mb-1">📝 정모 명칭</label>
                        <input type="text" id="newSessionTitle" placeholder="예: 일요일 공식 정모 리그전" class="w-full bg-white border border-slate-300 rounded-xl px-3 py-2 text-xs outline-none font-medium" required>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-black text-slate-700 mb-1">📅 정모 날짜</label>
                            <input type="date" id="newSessionDate" class="w-full bg-white border border-slate-300 rounded-xl px-3 py-2 text-xs outline-none font-mono font-medium" required>
                        </div>
                        <div>
                            <label class="block text-xs font-black text-slate-700 mb-1">🎯 목표 승리 점수 기입</label>
                            <input type="number" id="newSessionTargetScore" value="25" min="5" max="31" class="w-full bg-white border border-slate-300 rounded-xl px-3 py-2 text-xs font-black font-mono outline-none focus:ring-2 focus:ring-indigo-500" required>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 bg-white/60 p-2.5 rounded-xl border border-slate-200">
                        <input type="checkbox" id="checkboxTestMode" class="w-4 h-4 text-purple-600 rounded">
                        <label for="checkboxTestMode" class="text-[11px] font-bold text-purple-900 cursor-pointer select-none">🤖 AI 가상 시뮬레이터 테스트 모드 활성화</label>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black text-xs py-2.5 rounded-xl transition shadow-sm cursor-pointer">🚀 정모 개설 및 실시간 링크 배포</button>
                </form>
            </div>

            <div class="space-y-3">
                <div class="flex justify-between items-center px-1">
                    <h2 class="text-xs font-black tracking-wider text-slate-400 uppercase">📅 정모 대시보드 링크</h2>
                    <span id="sessionCountBadge" class="bg-slate-200 text-slate-700 font-mono font-bold text-[10px] px-2 py-0.5 rounded-full">0개 방</span>
                </div>
                <div id="sessionListContainer" class="space-y-3"></div>
            </div>
        </section>

        <section class="lg:col-span-7 space-y-6">
            <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-3xs">
                <div class="flex items-center gap-1.5 mb-2">
                    <span class="text-sm">🔍</span>
                    <h2 class="text-xs font-black text-slate-700">역대 전적 돋보기 검색 (클럽 아카이브 추적)</h2>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="inputGlobalSearchPlayer" placeholder="회원 이름을 입력해 주세요" class="flex-1 bg-slate-50 border border-slate-300 rounded-xl px-3 py-2 text-xs font-bold outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500 transition-all">
                    <button id="btnGlobalSearchRecord" class="bg-slate-900 hover:bg-slate-800 text-white text-xs font-bold px-4 py-2 rounded-xl transition cursor-pointer shadow-xs">검색</button>
                </div>
                <div id="globalSearchResultContainer" class="mt-3 max-h-[220px] overflow-y-auto space-y-2.5 scrollbar-thin"></div>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-2xs">
                <div class="flex items-center gap-2 border-b border-slate-100 pb-3 mb-3">
                    <span class="text-lg">🏆</span>
                    <div>
                        <h2 class="text-sm font-black text-slate-900">클럽 누적 레이팅 통합 랭킹보드</h2>
                        <p class="text-[10px] text-slate-400 font-medium">이름을 클릭하면 개인별 실시간 성장 대진 분석 그래프가 나타납니다.</p>
                    </div>
                </div>
                <div class="overflow-x-auto rounded-xl border border-slate-100">
                    <table class="w-full text-left border-collapse min-w-[500px]">
                        <thead>
                            <tr class="bg-slate-50/70 border-b border-slate-200 text-slate-500 text-[11px] font-black tracking-wide">
                                <th class="py-2.5 px-4 text-center w-14">순위</th>
                                <th class="py-2.5 px-4">이름 (조)</th>
                                <th class="py-2.5 px-4 text-center">총 경기수</th>
                                <th class="py-2.5 px-4 text-center">누적 전적</th>
                                <th class="py-2.5 px-4 text-center">승률</th>
                                <th class="py-2.5 px-4 text-right w-24">통합 MMR</th>
                            </tr>
                        </thead>
                        <tbody id="globalRankTableBody" class="text-xs text-slate-700 divide-y divide-slate-100 font-sans"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div id="chartModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-3xl p-5 w-full max-w-md shadow-2xl border border-slate-100 space-y-4">
            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <h3 id="modalPlayerTitle" class="text-sm font-black text-slate-900">회원 역대 분석 데이터</h3>
                <button id="btnCloseModal" class="text-slate-400 hover:text-slate-600 font-black text-sm p-1">✕</button>
            </div>
            <div class="relative w-full h-56">
                <canvas id="playerTrendChart"></canvas>
            </div>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                if (typeof window.initDashboardPage === 'function') { window.initDashboardPage(); }
            }, 300);
        });
    </script>
</body>
</html>
