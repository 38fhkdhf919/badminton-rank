<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏸 클럽 리그전 메인 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-12 select-none font-sans">

    <header class="bg-white border-b border-slate-200 p-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-2.5 h-2.5 bg-indigo-600 rounded-full animate-pulse"></div>
                <h1 class="text-base font-black text-slate-900">🏸 클럽 통합 메인 통제실</h1>
            </div>
            <nav class="flex gap-2 items-center">
                <button id="btnAdminToggle" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold px-3 py-1.5 rounded-lg border border-slate-300 transition shadow-2xs cursor-pointer mr-2 flex items-center gap-1">
                    🔐 관리자 모드 인증
                </button>
                <a href="./index.html" class="bg-indigo-50 border border-indigo-200 text-indigo-700 text-xs font-bold px-3 py-1.5 rounded-lg shadow-2xs">🏠 홈 대시보드</a>
                <a href="./players.html" class="bg-white hover:bg-slate-50 text-slate-6 text-xs font-bold px-3 py-1.5 rounded border border-slate-200 transition shadow-2xs">👥 회원 DB 관리</a>
            </nav>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-4 mt-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-1 space-y-4">
            <section class="bg-white rounded-2xl border border-slate-200 p-5 shadow-xs space-y-4 sticky top-24">
                <div class="border-b border-slate-100 pb-2">
                    <h2 class="text-xs font-black text-indigo-600 uppercase tracking-wider">📅 새로운 정모 개설 및 예약</h2>
                    <p class="text-[11px] text-slate-400 mt-0.5">새로운 매칭 리그전 세션을 개설합니다.</p>
                </div>
                
                <form id="createSessionForm" class="space-y-3 text-xs">
                    <div class="space-y-1">
                        <label class="text-slate-600 font-bold">정모 타이틀</label>
                        <input type="text" id="newSessionTitle" placeholder="예: 5월 마지막주 정모 리그전" required class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-slate-900 font-medium focus:border-indigo-500 focus:bg-white focus:outline-none transition-colors">
                    </div>

                    <div id="testModeWrapper" class="hidden items-center gap-2 p-2 bg-purple-50 rounded-xl border border-purple-100 mt-2">
                        <input type="checkbox" id="checkboxTestMode" class="w-4 h-4 text-purple-600 border-slate-300 rounded focus:ring-purple-500 cursor-pointer">
                        <label for="checkboxTestMode" class="text-[11px] text-purple-700 font-bold cursor-pointer select-none">
                            🤖 AI 시뮬레이션 테스트 모드로 개설
                        </label>
                    </div>

                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-lg shadow-md transition cursor-pointer mt-3">
                        ➕ 정모 방 새로 생성하기
                    </button>
                </form>
            </section>
        </div>

        <div class="md:col-span-2">
            <section class="bg-white rounded-2xl border border-slate-200 p-5 shadow-xs space-y-4">
                <div class="border-b border-slate-100 pb-3">
                    <h2 class="text-sm font-bold text-slate-800">📋 정모 운영 리그 타임라인 목록</h2>
                    <p class="text-[11px] text-slate-400 mt-0.5">아래 목록을 클릭하면 해당 정모의 실시간 제어실로 워프합니다.</p>
                </div>

                <div id="sessionListContainer" class="space-y-2.5 max-h-[600px] overflow-y-auto pr-1">
                    <div class="text-center py-12 text-slate-400 text-xs font-sans">파이어베이스에서 정모 목록을 실시간 스캔 중...</div>
                </div>
            </section>
        </div>

    </main>

    <script type="module" src="./app.js"></script>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                if (typeof window.initDashboardPage === 'function') {
                    window.initDashboardPage();
                    console.log("🚀 대시보드 마스터 엔진 안전 구동 성공!");
                } else {
                    setTimeout(() => { if(window.initDashboardPage) window.initDashboardPage(); }, 500);
                }
            }, 200);
        });
    </script>
</body>
</html>
