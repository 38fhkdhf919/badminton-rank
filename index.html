<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔗 파이어베이스 연동 및 데이터 적재 테스트</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-2xl text-center space-y-4">
        <h1 class="text-lg font-bold">📡 실시간 서버 연동 및 데이터 적재</h1>
        
        <div class="p-4 bg-slate-950 rounded-lg border border-slate-900 font-mono">
            <span class="text-xs text-slate-500 block mb-1">파이어베이스 수신 데이터:</span>
            <span id="connectionBadge" class="text-amber-500 font-black text-sm animate-pulse">서버 신호 대기 중...</span>
        </div>

        <div class="p-4 bg-slate-900 rounded-lg border border-slate-800 space-y-2 text-left">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider">📦 1단계: 초기 데이터베이스 구축</h2>
            <p class="text-[11px] text-slate-400 leading-relaxed">저장소의 players.json(26명) 데이터를 파이어베이스 실시간 서버에 최초 1회 전송합니다.</p>
            <button id="btnUpload" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded text-xs transition cursor-pointer mt-2">
                🚀 26명 명단 서버로 쏘기
            </button>
        </div>
        
        <p class="text-[10px] text-slate-500">※ 이 버튼은 최초 세팅용이며, 정모 당일에는 자동으로 굴러갑니다.</p>
    </div>

    <script type="module">
        import "./app.js";

        window.addEventListener('DOMContentLoaded', () => {
            const badge = document.getElementById('connectionBadge');
            
            // 실시간 연결 확인
            if (typeof window.checkServerConnection === 'function') {
                window.checkServerConnection((serverData) => {
                    if (serverData === "SUCCESS") {
                        badge.innerText = "✅ 통신 성공 (SUCCESS)";
                        badge.className = "text-emerald-400 font-black text-sm";
                    } else {
                        badge.innerText = `❓ 데이터 변경됨 (${serverData})`;
                        badge.className = "text-amber-400 font-black text-sm";
                    }
                });
            }

            // 🔥 버튼 클릭 시 app.js에 만들어둔 업로드 함수 실행
            document.getElementById('btnUpload').addEventListener('click', () => {
                if (typeof window.uploadMasterPlayers === 'function') {
                    window.uploadMasterPlayers();
                } else {
                    alert("엔진 기능이 아직 로드되지 않았습니다.");
                }
            });
        });
    </script>
</body>
</html>
