<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 클럽 매칭 및 명예의 전당</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen">

    <header class="bg-gradient-to-r from-slate-900 to-indigo-950 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-6 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div>
                <h1 class="text-xl sm:text-2xl font-black tracking-tight">🏸 CLUB LIVE SCOREBOARD</h1>
                <p class="text-xs text-indigo-200 mt-1">실시간 정모 매칭 시스템 및 통합 명예의 전당</p>
            </div>
            <div>
                <button id="btnAdminToggle" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs font-bold px-3 py-2 rounded-xl border border-slate-700 transition shadow-sm"></button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        <section class="lg:col-span-5 space-y-6">
            <div id="testModeWrapper" class="bg-gradient-to-br from-indigo-50 to-slate-50 border-2 border-indigo-200 p-5 rounded-2xl shadow-sm hidden flex-col gap-4">
                <h2 class="text-sm font-black text-indigo-950">📅 새로운 정모 세션 개설</h2>
                <form id="createSessionForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-black text-slate-700 mb-1">📝 정모 명칭</label>
                        <input type="text" id="newSessionTitle" placeholder="예: 일요일 공식 정모 리그전" class="w-full bg-white border border-slate-300 rounded-xl px-3 py-2 text-xs outline-none" required>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-black text-slate-700 mb-1">📅 정모 날짜</label>
                            <input type="date" id="newSessionDate" class="w-full bg-white border border-slate-300 rounded-xl px-3 py-2 text-xs outline-none font-mono" required>
                        </div>
                        <div>
                            <label class="block text-xs font-black text-slate-700 mb-1">🎯 목표 승리 점수</label>
                            <input type="number" id="newSessionTargetScore" value="25" min="5" max="31" class="w-full bg-white border border-slate-300 rounded-xl px-3 py-2 text-xs font-black font-mono outline-none" required>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 bg-white/60 p-2.5 rounded-xl border border-slate-200">
                        <input type="checkbox" id="checkboxTestMode" class="w-4 h-4 text-purple-600 rounded">
                        <label for="checkboxTestMode" class="text-[11px] font-bold text-purple-900 cursor-pointer select-none">🤖 AI 가상 시뮬레이터 테스트 모드 활성화</label>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black text-xs py-2.5 rounded-xl transition shadow-sm">🚀 정모 개설하기</button>
                </form>
            </div>

            <div class="space-y-3">
                <div class="flex justify-between items-center px-1">
                    <h2 class="text-xs font-black tracking-wider text-slate-400 uppercase">📅 생성된 정모 대시보드 리스트</h2>
                    <span id="sessionCountBadge" class="bg-slate-200 text-slate-700 font-mono font-bold text-[10px] px-2 py-0.5 rounded-full">0개 방</span>
                </div>
                <div id="sessionListContainer" class="space-y-3">
                    <div class="text-center py-8 text-slate-400 text-xs bg-white border border-dashed rounded-2xl">정모방 목록을 스캔 중입니다...</div>
                </div>
            </div>
        </section>

        <section class="lg:col-span-7 space-y-6">
            <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-3xs">
                <h2 class="text-xs font-black text-slate-700 mb-2">🔍 역대 전적 돋보기 검색 (통합)</h2>
                <div class="flex gap-2">
                    <input type="text" id="inputGlobalSearchPlayer" placeholder="회원 이름을 입력해 주세요" class="flex-1 bg-slate-50 border border-slate-300 rounded-xl px-3 py-2 text-xs font-bold outline-none">
                    <button id="btnGlobalSearchRecord" class="bg-slate-900 hover:bg-slate-800 text-white text-xs font-bold px-4 py-2 rounded-xl shadow-xs">검색</button>
                </div>
                <div id="globalSearchResultContainer" class="mt-3 max-h-[200px] overflow-y-auto space-y-2.5 text-xs"></div>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-2xs">
                <h2 class="text-sm font-black text-slate-900 mb-2">🏆 클럽 누적 레이팅 통합 랭킹보드</h2>
                <div class="overflow-x-auto rounded-xl border border-slate-100">
                    <table class="w-full text-left border-collapse min-w-[500px]">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 text-[11px] font-black">
                                <th class="py-2.5 px-4 text-center w-14">순위</th>
                                <th class="py-2.5 px-4">이름 (조)</th>
                                <th class="py-2.5 px-4 text-center">총 경기수</th>
                                <th class="py-2.5 px-4 text-center">누적 전적</th>
                                <th class="py-2.5 px-4 text-center">승률</th>
                                <th class="py-2.5 px-4 text-right w-24">통합 MMR</th>
                            </tr>
                        </thead>
                        <tbody id="globalRankTableBody" class="text-xs text-slate-700 divide-y divide-slate-100 font-sans">
                            <tr><td colspan="6" class="py-8 text-center text-slate-400">데이터 연동 대기 중...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div id="chartModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-3xl p-5 w-full max-w-md shadow-2xl border space-y-4">
            <div class="flex justify-between items-center border-b pb-2">
                <h3 id="modalPlayerTitle" class="text-sm font-black text-slate-900">MMR 성장 곡선</h3>
                <button id="btnCloseModal" class="text-slate-400 hover:text-slate-600 font-black text-sm p-1">✕</button>
            </div>
            <div class="relative w-full h-56">
                <canvas id="playerTrendChart"></canvas>
            </div>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
